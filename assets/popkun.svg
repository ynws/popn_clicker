<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <!-- 背景赤（上半分） -->
  <ellipse cx="120" cy="80" rx="110" ry="75" fill="#d41111"/>
  
  <!-- 左の目白い部分 -->
  <ellipse cx="70" cy="60" rx="24" ry="32" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <!-- 左の瞳 -->
  <ellipse cx="70" cy="65" rx="14" ry="18" fill="#111111"/>
  
  <!-- 右の目白い部分 -->
  <ellipse cx="170" cy="60" rx="24" ry="32" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <!-- 右の瞳 -->
  <ellipse cx="170" cy="65" rx="14" ry="18" fill="#111111"/>
  
  <!-- 中央の白いライン -->
  <rect x="0" y="70" width="240" height="20" fill="#ffffff"/>
  
  <!-- 下半分の赤 -->
  <ellipse cx="120" cy="120" rx="110" ry="45" fill="#d41111"/>
  
  <!-- 下部の装飾点（ドット） -->
  <circle cx="50" cy="130" r="3" fill="#a00000" opacity="0.6"/>
  <circle cx="65" cy="135" r="3" fill="#a00000" opacity="0.6"/>
  <circle cx="80" cy="138" r="3" fill="#a00000" opacity="0.6"/>
  <circle cx="160" cy="135" r="3" fill="#a00000" opacity="0.6"/>
  <circle cx="175" cy="138" r="3" fill="#a00000" opacity="0.6"/>
  <circle cx="190" cy="130" r="3" fill="#a00000" opacity="0.6"/>
</svg>
