<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ポップンクリッカー</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon/favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon/favicon.png">
<link rel="stylesheet" href="styles.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FY8S5DNTZN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-FY8S5DNTZN');
</script>
</head>
<body>

<div class="achievement-toast-container" id="achievementToastContainer"></div>
<div class="item-tooltip" id="itemTooltip"></div>

<div class="bg">
  <div class="panel"></div>
  <div class="rainbow">
    <div class="band green"></div>
    <div class="band blue"></div>
    <div class="band pink"></div>
    <div class="band yellow"></div>
  </div>

  <div class="bottom-line"></div>
  <div class="bottom"></div>

  <main class="game">
    <div class="click-area" id="clickArea">
      <div class="count" id="countDisplay">0 ノーツ</div>
      <div class="count-sub" id="perClickDisplay">クリックあたり +1 ノーツ</div>
      <button class="popkun-btn" id="popkunBtn" aria-label="ポップ君をクリック">
        <img class="popkun-image" src="icon/popkun.png" alt="ポップ君">
      </button>
      <div class="cps-info" id="cpsDisplay">毎秒 +0 ノーツ</div>
    </div>

    <div class="shop">
    <h2>🛒 購買部</h2>
    <div class="tabs">
      <button class="tab-btn active" data-tab="shop">購買部</button>
      <button class="tab-btn" data-tab="stats">記録</button>
    </div>

    <div id="shopPanel">
      <div class="section-label">✨ 強化</div>
      <div class="item-list" id="upgradeList"></div>
      <div class="section-label">🎤 キャラクター</div>
      <div class="item-list" id="generatorList"></div>
      <div class="tooltip-margin"></div>
    </div>

    <div id="statsPanel" style="display:none;">
      <div class="stat-row">
        <span class="stat-label">クリック回数</span>
        <span class="stat-value" id="statClickCount">0 回</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">累計獲得ノーツ数</span>
        <span class="stat-value" id="statTotalEarned">0 ノーツ</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">プレイ時間</span>
        <span class="stat-value" id="statPlayTime">0秒</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">キャラクターの総レベル</span>
        <span class="stat-value" id="statGeneratorTotal">0</span>
      </div>

      <div class="section-label collapsible" id="upgradeSectionHeader" data-target="ownedUpgradeList">
        <span class="section-label-text">⭐ 強化一覧</span>
        <span class="section-rate" id="upgradeSectionRate"></span>
        <span class="section-toggle-arrow">▾</span>
      </div>
      <div class="item-list" id="ownedUpgradeList"></div>

      <div class="section-label collapsible" id="achievementSectionHeader" data-target="achievementList">
        <span class="section-label-text">🏆 実績</span>
        <span class="section-rate" id="achievementSectionRate"></span>
        <span class="section-toggle-arrow">▾</span>
      </div>
      <div class="stat-row achievement-bonus-row">
        <span class="stat-label achievement-bonus-text" id="achievementBonusText"></span>
      </div>
      <div class="item-list" id="achievementList"></div>

      <div class="footer-buttons">
        <button class="btn-save" id="saveBtn">保存</button>
        <button class="btn-reset" id="resetBtn">リセット</button>
      </div>
      <div class="save-status" id="saveStatus"></div>
    </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/format.js"></script>
<script src="js/calculations.js"></script>
<script src="js/unlock.js"></script>
<script src="js/dom.js"></script>
<script src="js/tooltip.js"></script>
<script src="js/achievements.js"></script>
<script src="js/render.js"></script>
<script src="js/shop.js"></script>
<script src="js/click.js"></script>
<script src="js/save.js"></script>
<script src="js/main.js"></script>

</body>
</html>
